[build]
buildCommand = "npm ci && cd infra/scripts && npm install && cd ../.. && npm --workspace apps/backend run prisma:generate && npm --workspace packages/shared run build && npm --workspace apps/backend run build"

[deploy]
startCommand = "npm --workspace apps/backend run prisma:migrate:deploy && node apps/backend/dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 90
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

