name: Keep Alive

on:
  # schedule disabled — Render services no longer need keep-alive pings
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: staging
            backend_url_secret: BACKEND_URL_STAGING
          - env_name: production
            backend_url_secret: BACKEND_URL
    steps:
      - name: Ping health endpoint (${{ matrix.env_name }})
        run: |
          BACKEND_URL="${{ secrets[matrix.backend_url_secret] }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          echo "Pinging $BACKEND_URL/api/health (${{ matrix.env_name }})..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" || echo "000")

          if [ "$response" = "200" ]; then
            echo "Health check successful (${{ matrix.env_name }}, HTTP $response)"
          else
            echo "Health check returned HTTP $response (${{ matrix.env_name }})"
            exit 1
          fi
