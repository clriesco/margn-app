name: Daily Jobs

on:
  schedule:
    # Run all update scripts every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - prices
          - metrics
          - daily-check
      environment:
        description: "Which environment"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - staging
          - production

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: staging
            database_url_secret: DATABASE_URL_STAGING
          - env_name: production
            database_url_secret: DATABASE_URL
    steps:
      - name: Check if should run
        id: check
        run: |
          INPUT_ENV="${{ github.event.inputs.environment }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$INPUT_ENV" = "both" ] || [ "$INPUT_ENV" = "${{ matrix.env_name }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.should_run == 'true'

      - uses: actions/setup-node@v5
        if: steps.check.outputs.should_run == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          npm ci
          cd infra/scripts && npm ci

      - name: Generate Prisma Client
        if: steps.check.outputs.should_run == 'true'
        run: npm --workspace apps/backend run prisma:generate

      - name: Price Ingestion (${{ matrix.env_name }})
        if: |
          steps.check.outputs.should_run == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.job == 'all' || github.event.inputs.job == 'prices')
        working-directory: infra/scripts
        run: npx ts-node price-ingestion.ts
        env:
          DATABASE_URL: ${{ secrets[matrix.database_url_secret] }}

      - name: Metrics Refresh (${{ matrix.env_name }})
        if: |
          steps.check.outputs.should_run == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.job == 'all' || github.event.inputs.job == 'metrics')
        working-directory: infra/scripts
        run: npx ts-node metrics-refresh.ts
        env:
          DATABASE_URL: ${{ secrets[matrix.database_url_secret] }}

      - name: Daily Check (${{ matrix.env_name }})
        if: |
          steps.check.outputs.should_run == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.job == 'all' || github.event.inputs.job == 'daily-check')
        working-directory: infra/scripts
        run: npx ts-node daily-check.ts
        env:
          DATABASE_URL: ${{ secrets[matrix.database_url_secret] }}
