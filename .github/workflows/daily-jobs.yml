name: Daily Jobs

on:
  schedule:
    # Run all update scripts every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger
    inputs:
      job:
        description: "Which job to run (prices, metrics, daily-check, or all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - prices
          - metrics
          - daily-check
      environment:
        description: "Which environment to run against (staging, production, or both)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - staging
          - production

jobs:
  price-ingestion:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'prices'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: staging
            backend_url_secret: BACKEND_URL_STAGING
            cron_token_secret: CRON_SECRET_TOKEN_STAGING
          - env_name: production
            backend_url_secret: BACKEND_URL
            cron_token_secret: CRON_SECRET_TOKEN
    steps:
      - name: Check if environment should run
        id: check
        run: |
          INPUT_ENV="${{ github.event.inputs.environment }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$INPUT_ENV" = "both" ] || [ "$INPUT_ENV" = "${{ matrix.env_name }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Call price ingestion endpoint (${{ matrix.env_name }})
        if: steps.check.outputs.should_run == 'true'
        run: |
          BACKEND_URL="${{ secrets[matrix.backend_url_secret] }}"
          CRON_TOKEN="${{ secrets[matrix.cron_token_secret] }}"

          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          if [ -z "$CRON_TOKEN" ]; then
            echo "CRON_SECRET_TOKEN secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          echo "Calling price ingestion endpoint (${{ matrix.env_name }})..."
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "$BACKEND_URL/api/cron/price-ingestion" || echo -e "\n000")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" = "200" ]; then
            echo "Price ingestion completed successfully (${{ matrix.env_name }})"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"
          else
            echo "Price ingestion failed with HTTP $http_code (${{ matrix.env_name }})"
            echo "$body"
            exit 1
          fi

  metrics-refresh:
    runs-on: ubuntu-latest
    needs: price-ingestion
    if: |
      always() &&
      (github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'metrics')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: staging
            backend_url_secret: BACKEND_URL_STAGING
            cron_token_secret: CRON_SECRET_TOKEN_STAGING
          - env_name: production
            backend_url_secret: BACKEND_URL
            cron_token_secret: CRON_SECRET_TOKEN
    steps:
      - name: Check if environment should run
        id: check
        run: |
          INPUT_ENV="${{ github.event.inputs.environment }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$INPUT_ENV" = "both" ] || [ "$INPUT_ENV" = "${{ matrix.env_name }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Call metrics refresh endpoint (${{ matrix.env_name }})
        if: steps.check.outputs.should_run == 'true'
        run: |
          BACKEND_URL="${{ secrets[matrix.backend_url_secret] }}"
          CRON_TOKEN="${{ secrets[matrix.cron_token_secret] }}"

          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          if [ -z "$CRON_TOKEN" ]; then
            echo "CRON_SECRET_TOKEN secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          echo "Calling metrics refresh endpoint (${{ matrix.env_name }})..."
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "$BACKEND_URL/api/cron/metrics-refresh" || echo -e "\n000")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" = "200" ]; then
            echo "Metrics refresh completed successfully (${{ matrix.env_name }})"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"
          else
            echo "Metrics refresh failed with HTTP $http_code (${{ matrix.env_name }})"
            echo "$body"
            exit 1
          fi

  daily-check:
    runs-on: ubuntu-latest
    needs: metrics-refresh
    if: |
      always() &&
      (github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'daily-check')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: staging
            backend_url_secret: BACKEND_URL_STAGING
            cron_token_secret: CRON_SECRET_TOKEN_STAGING
          - env_name: production
            backend_url_secret: BACKEND_URL
            cron_token_secret: CRON_SECRET_TOKEN
    steps:
      - name: Check if environment should run
        id: check
        run: |
          INPUT_ENV="${{ github.event.inputs.environment }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$INPUT_ENV" = "both" ] || [ "$INPUT_ENV" = "${{ matrix.env_name }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Call daily check endpoint (${{ matrix.env_name }})
        if: steps.check.outputs.should_run == 'true'
        run: |
          BACKEND_URL="${{ secrets[matrix.backend_url_secret] }}"
          CRON_TOKEN="${{ secrets[matrix.cron_token_secret] }}"

          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          if [ -z "$CRON_TOKEN" ]; then
            echo "CRON_SECRET_TOKEN secret not set for ${{ matrix.env_name }}. Skipping."
            exit 0
          fi

          echo "Calling daily check endpoint (${{ matrix.env_name }})..."
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "$BACKEND_URL/api/cron/daily-check" || echo -e "\n000")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" = "200" ]; then
            echo "Daily check completed successfully (${{ matrix.env_name }})"
            echo "$body" | jq '.' 2>/dev/null || echo "$body"
          else
            echo "Daily check failed with HTTP $http_code (${{ matrix.env_name }})"
            echo "$body"
            exit 1
          fi
